<aside class="helm-sidebar" [class.expanded]="expanded" role="navigation" aria-label="Main navigation">

  <!-- Brand / Logo -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <lucide-angular name="anchor" [size]="20" />
    </div>
    @if (expanded) {
      <span class="brand-name font-display">HELM</span>
    }
  </div>

  <!-- Toggle button -->
  <button
    class="sidebar-toggle"
    (click)="toggleExpanded.emit()"
    [attr.aria-label]="expanded ? 'Collapse sidebar' : 'Expand sidebar'"
    matRipple
  >
    <lucide-angular
      name="chevron-right"
      [size]="16"
      class="toggle-icon"
      [class.rotated]="expanded"
    />
  </button>

  <!-- Navigation items -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [matTooltip]="expanded ? '' : item.tooltip"
        matTooltipPosition="right"
        matRipple
      >
        <span class="nav-icon">
          <lucide-angular [name]="item.iconName" [size]="18" />
        </span>
        @if (expanded) {
          <span class="nav-label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Spacer -->
  <div class="sidebar-spacer"></div>

  <!-- Alert badge indicator — live count from AlertService -->
  <a
    class="nav-item alert-indicator"
    routerLink="/settings"
    [matTooltip]="expanded ? '' : (alertService.unacknowledgedCount() + ' alerts')"
    matTooltipPosition="right"
    matRipple
    [matBadge]="alertService.unacknowledgedCount() > 0 ? alertService.unacknowledgedCount() : null"
    matBadgeColor="warn"
    matBadgeSize="small"
    matBadgePosition="above after"
  >
    <span class="nav-icon">
      <lucide-angular
        name="bell"
        [size]="18"
        [class.text-critical]="alertService.unacknowledgedCount() > 0"
      />
    </span>
    @if (expanded) {
      <span class="nav-label">
        Alerts
        @if (alertService.unacknowledgedCount() > 0) {
          <span class="alert-count-badge">{{ alertService.unacknowledgedCount() }}</span>
        }
      </span>
    }
  </a>

</aside>
