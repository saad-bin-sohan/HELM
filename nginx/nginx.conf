# =============================================================================
# HELM — Nginx Reverse Proxy Configuration
# Services:
#   helm-ui     → Angular SSR server    (port 4000)
#   helm-server → Node.js API + WS      (port 3000)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;  # Don't expose nginx version

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    # Note: text/html is always gzip'd by nginx, don't list it here
    gzip_types
        application/javascript
        application/json
        application/xml
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        font/woff2
        image/svg+xml;

    # ── Upstream services ──────────────────────────────────────────────────────
    upstream angular_ssr {
        server helm-ui:4000;
        keepalive 32;
    }

    upstream node_api {
        server helm-server:3000;
        keepalive 32;
    }

    # ── WebSocket upgrade map ──────────────────────────────────────────────────
    # Properly sets Connection header for WS upgrade vs normal keepalive
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Max request body size (for command payloads)
        client_max_body_size 1m;

        # ── Security headers ────────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"  always;
        add_header X-Content-Type-Options    "nosniff"     always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── WebSocket — route to Node.js API server ─────────────────────────────
        # The Angular client connects to ws://yourdomain.com/ws
        # nginx upgrades the HTTP connection to WebSocket and forwards to helm-server.
        # The helm-server's WebSocketServer is attached to the HTTP server (no path filter),
        # so any WS upgrade request on port 3000 is handled correctly.
        location /ws {
            proxy_pass         http://node_api;
            proxy_http_version 1.1;

            # WebSocket upgrade headers (required)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Disable proxy read timeout for long-lived WS connections
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;

            # Disable buffering for real-time WebSocket
            proxy_buffering    off;
        }

        # ── REST API — route to Node.js API server ──────────────────────────────
        location /api/ {
            proxy_pass         http://node_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # API responses must not be cached (live data)
            add_header         Cache-Control "no-store, no-cache, must-revalidate" always;
            proxy_no_cache     1;
            proxy_cache_bypass 1;
        }

        # ── Hashed static assets — Angular browser bundle ───────────────────────
        # Angular production builds hash all JS/CSS filenames (e.g., main.ABCD1234.js).
        # These can be cached aggressively since the hash changes with every build.
        location ~* \.(js|css|woff2|woff|ttf|otf)$ {
            proxy_pass         http://angular_ssr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;

            # 1 year cache for content-hashed assets
            expires    1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # ── Everything else — Angular SSR ───────────────────────────────────────
        # All HTML page requests go to the Angular SSR server.
        # Angular server-renders the full HTML on first request.
        location / {
            proxy_pass         http://angular_ssr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # HTML must NOT be cached (SSR renders per-request, and Angular
            # hydration depends on the server state at render time)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;

            # Timeout for SSR response (Angular platform init can take a moment)
            proxy_read_timeout 60s;
        }
    }
}
